<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where I've Been - Kitsora</title>
  <link rel="icon" type="image/png" href="./assets/remote/images/favicon.png">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    body {
      padding: 0;
    }

    .where-wrap {
      width: min(1480px, calc(100vw - 34px));
      margin: 0 auto;
      padding: clamp(34px, 7vw, 88px) 0 clamp(48px, 8vw, 96px);
      position: relative;
      z-index: 1;
    }

    .where-hero {
      width: min(920px, 100%);
      margin: 0 auto clamp(32px, 5vw, 60px);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: rgba(188, 238, 255, .78);
      font-size: .9rem;
      font-weight: 800;
      letter-spacing: .24em;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(112, 200, 255, .72),
        0 0 18px rgba(177, 92, 255, .5);
    }

    .where-hero h1 {
      margin: 0;
      color: #f8fbff;
      font-size: clamp(3.4rem, 9vw, 8rem);
      line-height: .92;
      letter-spacing: 0;
      text-shadow:
        0 0 8px rgba(255, 255, 255, .9),
        0 0 24px rgba(112, 200, 255, .76),
        0 0 52px rgba(177, 92, 255, .68);
    }

    .where-subtitle {
      max-width: 620px;
      margin: 18px auto 0;
      color: rgba(248, 252, 255, .84);
      font-size: clamp(1rem, 1.7vw, 1.22rem);
      font-weight: 700;
      text-shadow:
        0 0 5px rgba(0, 0, 0, .9),
        0 0 14px rgba(112, 200, 255, .38);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 26px;
      padding: 11px 18px;
      color: #f7fbff;
      font-weight: 800;
      text-decoration: none;
      border: 1px solid rgba(188, 238, 255, .58);
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(11, 19, 48, .72), rgba(35, 18, 65, .64));
      box-shadow:
        inset 0 0 14px rgba(255, 255, 255, .08),
        0 0 18px rgba(112, 200, 255, .22),
        0 0 34px rgba(177, 92, 255, .2);
      text-shadow:
        0 0 7px rgba(255, 255, 255, .75),
        0 0 16px rgba(112, 200, 255, .45);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .home-link:hover,
    .home-link:focus-visible {
      color: #ffffff;
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, .9);
      box-shadow:
        inset 0 0 16px rgba(255, 255, 255, .12),
        0 0 20px rgba(255, 255, 255, .34),
        0 0 42px rgba(112, 200, 255, .48),
        0 0 70px rgba(244, 114, 255, .32);
    }

    .masonry {
      column-width: 310px;
      column-gap: clamp(18px, 2.4vw, 30px);
    }

    .photo-card {
      display: inline-block;
      width: 100%;
      margin: 0 0 clamp(18px, 2.4vw, 30px);
      break-inside: avoid;
      border: 1px solid rgba(188, 238, 255, .22);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(7, 10, 28, .72);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, .04) inset,
        0 14px 36px rgba(0, 0, 0, .34),
        0 0 24px rgba(112, 200, 255, .12);
      content-visibility: auto;
      contain-intrinsic-size: 320px 210px;
      transform: translateZ(0);
      transition: transform 210ms ease, border-color 210ms ease, box-shadow 210ms ease;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
      background: rgba(255, 255, 255, .04);
      transform: scale(1.001);
      transition: transform 260ms ease, filter 260ms ease;
    }

    .photo-card:hover,
    .photo-card:focus-within {
      transform: translateY(-5px);
      border-color: rgba(244, 214, 255, .72);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, .08) inset,
        0 18px 44px rgba(0, 0, 0, .42),
        0 0 22px rgba(255, 255, 255, .3),
        0 0 44px rgba(112, 200, 255, .45),
        0 0 72px rgba(244, 114, 255, .34);
    }

    .photo-card:hover img,
    .photo-card:focus-within img {
      transform: scale(1.045);
      filter: saturate(1.12) brightness(1.06);
    }

    @media (max-width: 720px) {
      .where-wrap {
        width: min(100% - 20px, 520px);
        padding-top: 32px;
      }

      .masonry {
        column-width: 240px;
        column-gap: 16px;
      }

      .photo-card {
        margin-bottom: 16px;
      }
    }
  </style>
</head>
